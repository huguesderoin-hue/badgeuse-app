<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Badgeuse">
<meta name="theme-color" content="#0a0f1a">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="manifest" href="/manifest.json">
<title>Badgeuse NFC</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0f1a;--surface:#111827;--surface2:#1a2235;
  --accent:#00d4aa;--accent2:#0ea5e9;--red:#ff4d6d;
  --green:#00d4aa;--text:#f0f4ff;--muted:#6b7a99;--border:#1e2d45;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden}

/* NAV */
nav{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg);height:53px}
.nav-icon{font-size:22px}
.nav-tabs{display:flex;gap:4px}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s;letter-spacing:.05em;font-family:'Syne',sans-serif}
.tab.active{background:var(--accent);color:#000}

/* PAGES — toutes cachées par défaut */
.page{display:none;position:absolute;top:53px;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page.active{display:block}

/* PAGE SCANNER */
#page-scanner{padding:20px}
.live-clock{text-align:center;font-family:'DM Mono',monospace;font-size:52px;font-weight:500;color:var(--text);letter-spacing:.04em;padding:24px 0 20px}
.status-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin:0 0 16px;text-align:center;position:relative;overflow:hidden}
.status-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;transform:scaleX(0);transition:transform .5s;transform-origin:left}
.status-card.open::before{transform:scaleX(1);background:var(--red)}
.status-card.closed::before{transform:scaleX(1);background:var(--green)}
.status-dot{width:10px;height:10px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:7px;vertical-align:middle}
.status-dot.open{background:var(--red);box-shadow:0 0 10px var(--red);animation:pulse 1.5s infinite}
.status-dot.closed{background:var(--green);box-shadow:0 0 10px var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.status-time{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--text)}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px}
.stat-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.stat-value{font-family:'DM Mono',monospace;font-size:22px;font-weight:500}
.stat-value.accent{color:var(--accent)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.btn{padding:18px;border-radius:14px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.btn-icon{font-size:24px}
.btn-start{background:var(--green);color:#000}
.btn-start:active{transform:scale(.97)}
.btn-stop{background:var(--red);color:#fff}
.btn-stop:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* PAGE POINTAGES — pleine hauteur avec tableau scrollable */
#page-pointages{display:none;flex-direction:column}
#page-pointages.active{display:flex}
.pt-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.pt-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.refresh-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:8px;font-size:11px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600}
#pointages-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* PAGE RECAP */
#page-recap{padding:20px}

/* TABLES */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--surface2);color:var(--muted);font-weight:600;padding:10px 14px;text-align:left;letter-spacing:.06em;text-transform:uppercase;font-size:10px;white-space:nowrap;position:sticky;top:0;z-index:5}
td{padding:12px 14px;border-top:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;white-space:nowrap}
tr.open-row td{background:rgba(255,77,109,.06)}
tr.closed-row td{background:rgba(0,212,170,.03)}
tr:hover td{background:var(--surface2)}
.badge-status{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.badge-open{background:rgba(255,77,109,.2);color:var(--red)}
.badge-closed{background:rgba(0,212,170,.2);color:var(--green)}

/* RECAP CARDS */
.recap-header{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px}
.recap-month{font-size:20px;font-weight:800;margin-bottom:4px}
.recap-sub{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
.recap-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}
.recap-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden}
.recap-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.recap-card.blue::after{background:var(--accent2)} .recap-card.blue .rv{color:var(--accent2)}
.recap-card.green::after{background:var(--green)} .recap-card.green .rv{color:var(--green)}
.recap-card.red::after{background:var(--red)} .recap-card.red .rv{color:var(--red)}
.recap-card.purple::after{background:#a78bfa} .recap-card.purple .rv{color:#a78bfa}
.rl{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.rv{font-family:'DM Mono',monospace;font-size:24px;font-weight:500}
.section-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:20px 0 12px}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page.active{animation:fadeIn .25s ease}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface2);border:1px solid var(--accent);color:var(--text);padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<nav>
  <div class="nav-icon">⏱</div>
  <div class="nav-tabs">
    <button class="tab active" onclick="showPage('scanner',this)">Scanner</button>
    <button class="tab" onclick="showPage('pointages',this)">Pointages</button>
    <button class="tab" onclick="showPage('recap',this)">Récap</button>
  </div>
</nav>

<!-- SCANNER -->
<div class="page active" id="page-scanner">
  <div class="live-clock" id="current-time">--:--:--</div>

  <div class="status-card" id="status-card">
    <div class="status-label"><span class="status-dot" id="status-dot"></span><span id="status-text">Vérification...</span></div>
    <div class="status-time" id="status-time">--:--</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Aujourd'hui</div>
      <div class="stat-value accent" id="today-hours">--:--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Cette semaine</div>
      <div class="stat-value" id="week-hours">--:--</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-start" id="btn-start" onclick="handleScan('start')">
      <span class="btn-icon">▶</span><span>START</span>
    </button>
    <button class="btn btn-stop" id="btn-stop" onclick="handleScan('stop')">
      <span class="btn-icon">■</span><span>STOP</span>
    </button>
  </div>
</div>

<!-- POINTAGES -->
<div class="page" id="page-pointages">
  <div class="pt-header">
    <span class="pt-title">Sessions</span>
    <button class="refresh-btn" onclick="loadPointages()">↻ Actualiser</button>
  </div>
  <div id="pointages-content" class="loading"><span class="spinner"></span>Chargement...</div>
</div>

<!-- RECAP -->
<div class="page" id="page-recap">
  <div id="recap-content" class="loading"><span class="spinner"></span>Chargement...</div>
</div>

<div class="toast" id="toast"></div>

<script>
const WEBHOOK='https://hook.eu2.make.com/cuue2x9syuasex8k1ptghj7xctasjlcm';
const SHEET_ID='1-Qf9BlGiS9io5DhlU-BS2a4y2Eq4Gk-MrCMkqdHFZHQ';
const API_KEY='AIzaSyCFdgyzjA97tI5SiTBIcEJdgj4lAYRHQus';
const BASE=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values`;
let sessionOpen=false;

setInterval(()=>{
  document.getElementById('current-time').textContent=new Date().toLocaleTimeString('fr-FR');
},1000);

function showPage(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  el.classList.add('active');
  if(name==='pointages')loadPointages();
  if(name==='recap')loadRecap();
}

function showToast(msg,color){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.borderColor=color||'var(--accent)';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);
}

async function fetchSheet(range){
  const r=await fetch(`${BASE}/${encodeURIComponent(range)}?key=${API_KEY}`);
  const d=await r.json();return d.values||[];
}

function parseTime(s){if(!s)return 0;const p=s.split(':').map(Number);return p[0]*3600+(p[1]||0)*60+(p[2]||0);}
function formatDur(s){if(s<=0)return'0:00';return`${Math.floor(s/3600)}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}`;}
function getWeek(d){d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));return Math.ceil((((d-new Date(Date.UTC(d.getUTCFullYear(),0,1)))/86400000)+1)/7);}

async function loadStatus(){
  try{
    const rows=await fetchSheet('POINTAGES!A2:P500');
    const today=new Date().toLocaleDateString('fr-FR');
    const wn=getWeek(new Date());
    const open=rows.find(r=>r[5]==='open');
    sessionOpen=!!open;
    const card=document.getElementById('status-card');
    const dot=document.getElementById('status-dot');
    if(open){
      card.className='status-card open';dot.className='status-dot open';
      document.getElementById('status-text').textContent='SESSION EN COURS';
      document.getElementById('status-time').textContent='Depuis '+(open[2]||'--:--');
    }else{
      card.className='status-card closed';dot.className='status-dot closed';
      document.getElementById('status-text').textContent='AUCUNE SESSION';
      const last=[...rows].reverse().find(r=>r[5]==='closed');
      document.getElementById('status-time').textContent=last?'Dernière fin · '+(last[3]||'--:--'):'--:--';
    }
    updateBtns();
    let ts=0;rows.filter(r=>r[1]===today&&r[5]==='closed').forEach(r=>{if(r[4])ts+=parseTime(r[4]);});
    document.getElementById('today-hours').textContent=formatDur(ts);
    let ws=0;rows.filter(r=>r[15]&&parseInt(r[15])===wn&&r[5]==='closed').forEach(r=>{if(r[4])ws+=parseTime(r[4]);});
    document.getElementById('week-hours').textContent=formatDur(ws);
  }catch(e){console.error(e);}
}

function updateBtns(){
  document.getElementById('btn-start').disabled=sessionOpen;
  document.getElementById('btn-stop').disabled=!sessionOpen;
}

async function handleScan(type){
  const btn=document.getElementById(type==='start'?'btn-start':'btn-stop');
  btn.disabled=true;btn.style.opacity='0.6';
  try{
    let lat='0',lng='0';
    try{const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:5000}));lat=pos.coords.latitude.toFixed(6);lng=pos.coords.longitude.toFixed(6);}catch(e){}
    const now2=new Date();
    const offset=now2.getTimezoneOffset();
    const local=new Date(now2.getTime()-offset*60000);
    const ts=local.toISOString().slice(0,19);
    const resp=await fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({timestamp:ts,lat,lng,maps_link:`https://maps.google.com/?q=${lat},${lng}`})});
    if(resp.ok||resp.status===200){
      showToast(type==='start'?'🟢 Session démarrée !':'🔴 Session terminée !',type==='start'?'var(--green)':'var(--red)');
      setTimeout(()=>loadStatus(),2500);
    }else showToast('⚠️ Erreur webhook','var(--red)');
  }catch(e){showToast('⚠️ Erreur réseau','var(--red)');}
  btn.style.opacity='1';updateBtns();
}

async function loadPointages(){
  document.getElementById('pointages-content').innerHTML='<div class="loading"><span class="spinner"></span>Chargement...</div>';
  try{
    const rows=await fetchSheet('POINTAGES!A2:P500');
    const data=rows.filter(r=>r[0]).reverse();
    if(!data.length){document.getElementById('pointages-content').innerHTML='<div class="loading">Aucune session</div>';return;}
    let h='<div class="table-wrap"><table><thead><tr><th>Date</th><th>Début</th><th>Fin</th><th>Durée</th><th>Statut</th><th>Supp.</th></tr></thead><tbody>';
    data.forEach(r=>{
      const o=r[5]==='open';
      h+=`<tr class="${o?'open-row':'closed-row'}"><td>${r[1]||'-'}</td><td>${r[2]||'-'}</td><td>${r[3]||'-'}</td><td>${r[4]||'-'}</td><td><span class="badge-status ${o?'badge-open':'badge-closed'}">${r[5]||'-'}</span></td><td>${r[13]||'-'}</td></tr>`;
    });
    h+='</tbody></table></div>';
    document.getElementById('pointages-content').innerHTML=h;
  }catch(e){document.getElementById('pointages-content').innerHTML='<div class="loading">Erreur</div>';}
}

async function loadRecap(){
  document.getElementById('recap-content').innerHTML='<div class="loading"><span class="spinner"></span>Chargement...</div>';
  try{
    const vals=await fetchSheet('RÉCAP MENSUEL!A1:D20');
    const now=new Date();
    const months=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    let jours='-',heures='-',supp='-',solde='-';
    vals.forEach(r=>{
      if(r[0]==='Jours travaillés')jours=r[1]||'-';
      if(r[0]==='Heures travaillées')heures=r[1]||'-';
      if(r[0]==='Heures supplémentaires')supp=r[1]||'-';
      if(r[0]==='Solde (±)')solde=r[1]||'-';
    });
    document.getElementById('recap-content').innerHTML=`
      <div class="recap-header">
        <div class="recap-month">${months[now.getMonth()]} ${now.getFullYear()}</div>
        <div class="recap-sub">Récapitulatif mensuel automatique</div>
      </div>
      <div class="recap-grid">
        <div class="recap-card blue"><div class="rl">Jours travaillés</div><div class="rv">${jours}</div></div>
        <div class="recap-card green"><div class="rl">Heures travaillées</div><div class="rv">${heures}</div></div>
        <div class="recap-card red"><div class="rl">Heures supp.</div><div class="rv">${supp}</div></div>
        <div class="recap-card purple"><div class="rl">Solde (±)</div><div class="rv">${solde}</div></div>
      </div>
      <div class="section-title">Horaires de référence</div>
      <div class="table-wrap"><table><thead><tr><th>Jour</th><th>Matin</th><th>Après-midi</th><th>Total</th></tr></thead><tbody>
        <tr><td>Lun → Jeu</td><td>8h45–13h00</td><td>14h00–17h30</td><td>7h30</td></tr>
        <tr><td>Vendredi</td><td>8h45–12h45</td><td>—</td><td>4h00</td></tr>
      </tbody></table></div>`;
  }catch(e){document.getElementById('recap-content').innerHTML='<div class="loading">Erreur</div>';}
}

loadStatus();
setInterval(loadStatus,30000);
</script>
</body>
</html>
